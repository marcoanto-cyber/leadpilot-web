<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1437"/>
      <stop offset="100%" stop-color="#080F2A"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#FFC56E" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#FF7849" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0B1437" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="route" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D7EFF"/>
      <stop offset="60%" stop-color="#FFC56E"/>
      <stop offset="100%" stop-color="#FF7849"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6FA0FF"/>
      <stop offset="55%" stop-color="#FFC56E"/>
      <stop offset="100%" stop-color="#FF7849"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Ruta de vuelo -->
  <path d="M80 540 C 300 540, 360 380, 560 360 S 860 300, 1120 110"
        fill="none" stroke="url(#route)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="80" cy="540" r="8" fill="#3D7EFF"/>
  <circle cx="560" cy="360" r="8" fill="#3D7EFF"/>
  <circle cx="1120" cy="110" r="10" fill="#FF7849"/>

  <!-- Logo -->
  <g transform="translate(80,80)">
    <rect width="60" height="60" rx="16" fill="url(#route)"/>
    <path d="M14 36 L48 12 L36 50 L29 36 Z" fill="#fff" opacity="0.95"/>
    <text x="78" y="42" font-family="'Space Grotesk', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Lead Pilot</text>
  </g>

  <!-- Titular -->
  <text x="80" y="280" font-family="'Space Grotesk', Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">Deja de perder clientes por</text>
  <text x="80" y="356" font-family="'Space Grotesk', Arial, sans-serif" font-size="64" font-weight="700" fill="url(#word)">no responder a tiempo.</text>

  <text x="80" y="430" font-family="Arial, sans-serif" font-size="30" fill="#AFC0E0">Automatización con IA para PyMEs en México</text>
</svg>
